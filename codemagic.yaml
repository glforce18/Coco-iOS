workflows:
  ios-release:
    name: Coco iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.patpat.patpatGame"
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.pub-cache
    scripts:
      - name: Set up keychain + auto-signing via ASC API
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter packages get
        script: flutter packages pub get
      - name: Precache iOS artifacts (generates Flutter/Generated.xcconfig)
        script: flutter precache --ios
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Bump iOS build number
        script: |
          cd ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo 49)
          NEXT_BUILD=$((LATEST_BUILD_NUMBER + 1))
          echo "Bumping to build number $NEXT_BUILD"
          agvtool new-version -all "$NEXT_BUILD"
      - name: Build IPA (release)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
