name: patpat_game
description: PatPat - Eslestirme Macerasi
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.3.4
  collection: ^1.19.1
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  cloud_firestore: ^5.6.1
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#0D0235"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sprites/
    - assets/backgrounds/
    - assets/ui/
